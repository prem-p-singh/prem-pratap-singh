name: Biweekly Blog Draft

on:
  schedule:
    # Fires every Thursday at 1 PM UTC (8 AM PT). The biweekly-gate job below
    # then only proceeds on ODD ISO weeks, so a draft is generated every other
    # Thursday. GitHub cron has no native biweekly schedule.
    - cron: '0 13 * * 4'
  workflow_dispatch:
    inputs:
      theme:
        description: "Force rotating theme (e.g. ai_and_foundation_models). Leave empty for weekly rotation."
        required: false
        default: ""

jobs:
  gate:
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.check.outputs.run }}
    steps:
      - name: Biweekly gate (odd ISO weeks only for scheduled runs)
        id: check
        run: |
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "Manual trigger: proceeding regardless of week."
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            WEEK=$(date -u +%V)
            # 10# forces base-10 so leading-zero weeks (e.g. 08) are not read as octal
            if [ $(( 10#$WEEK % 2 )) -ne 0 ]; then
              echo "ISO week $WEEK is odd: proceeding (biweekly)."
              echo "run=true" >> "$GITHUB_OUTPUT"
            else
              echo "ISO week $WEEK is even: skipping this week (biweekly)."
              echo "run=false" >> "$GITHUB_OUTPUT"
            fi
          fi

  generate-draft:
    needs: gate
    if: needs.gate.outputs.run == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install -r blog_automation/requirements.txt

      - name: Generate pending draft
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          ROTATING_THEME: ${{ inputs.theme }}
        run: python blog_automation/generate_draft.py

      - name: Commit draft if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add blog_automation/drafts/pending
          if git diff --cached --quiet; then
            echo "No new draft to commit"
          else
            git commit -m "chore: add biweekly pending blog draft"
            git push
          fi
