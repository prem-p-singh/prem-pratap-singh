# Keyword bank for blog draft generation.
#
# Selection strategy: TRIANGULATED ROTATION.
# Every run's keyword set is built from three vertices:
#   1. two anchors  — plant_pathogen_biology + synthetic_biology, always sampled
#   2. one rotating — a different theme each week, chosen so no theme repeats
#                     until all rotatable themes have been used
#
# The rotating theme is picked by shuffling the rotatable themes with a
# year-seeded RNG (order is randomized once per year, stable within the year),
# then indexing by ISO week number. This gives a fresh theme every week and full
# coverage before any repeat. Within-theme keyword picks are seeded by the run
# date, so the exact keywords also vary week to week.

selection:
  # Fixed anchor themes and how many keywords to sample from each per run.
  anchors:
    plant_pathogen_biology: 3
    synthetic_biology: 3
  # The rotating vertex: one theme per run (all themes except the anchors are
  # eligible), and how many keywords to sample from it.
  rotating:
    sample: 4

