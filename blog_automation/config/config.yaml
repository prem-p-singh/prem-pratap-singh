site:
  title: "prempsingh.com"
  base_url: "https://www.prempsingh.com"
  blog_content_dir: "./content/blog"

social:
  image_model: "gpt-image-1"
  image_size: "1536x1024"   # 16:9 landscape for LinkedIn hero
  image_quality: "high"      # low | medium | high (high produces cleaner illustrations)

content:
  # Triangulated keyword bank (primary source). If this file exists, keyword
  # selection uses rotating-theme + anchor sampling from it. If it is missing,
  # the pipeline falls back to legacy CV keyword extraction below.
  keywords_bank: "./blog_automation/config/keywords.yaml"
  # Author voice profile injected into the generation prompt (override with the
  # VOICE_PROFILE env var). If absent, drafts generate without it.
  voice_profile: "./blog_automation/voice_profile.md"
  # Legacy fallback only (used when keywords_bank is absent):
  # Relative to repo root; override with CV_PDF_PATH env var
  cv_pdf_path: "./public/cv.pdf"
  manual_keywords:
    - grapevine virology
    - plant-pathogen interactions
    - multi-omics
    - nanoencapsulation
  keyword_count: 12
  max_sources_per_keyword: 3
  top_sources: 8  # number of best sources to keep after LLM ranking
  min_words: 700
  max_words: 750

feeds:
  # Recency window for scholarly sources (arXiv sort, OpenAlex, Europe PMC).
  recency_days: 120
  # Max total sources kept in the ranking pool after merge + dedupe.
  pool_cap: 40
  # Contact email for the OpenAlex polite pool (faster, more reliable).
  mailto: "pr0982@gmail.com"
  # Each platform: toggle on/off and set a per-keyword result cap.
  arxiv:
    enabled: true
    max_per_keyword: 3
  google_news:
    enabled: true
    max_per_keyword: 3
  openalex:
    enabled: true
    max_per_keyword: 3
  europepmc:
    enabled: true
    max_per_keyword: 3

llm:
  use_openai: true
  # Product name "GPT-5.6 Sol". Verify the exact API id at
  # platform.openai.com/docs/models. Override without editing code by setting
  # the OPENAI_MODEL env var (takes precedence over this value).
  model: "gpt-5.6"
  max_retries: 3
  retry_base_delay: 2.0
  # USD price per 1,000,000 tokens, used to estimate per-run cost in the email.
  # Fill in from platform.openai.com/docs/pricing for your model. Leave at 0 to
  # show token counts without a dollar estimate.
  pricing:
    input_per_1m: 0
    output_per_1m: 0

author:
  name: "Prem Pratap Singh"

schedule:
  daily_run_hour_local: 8

guards:
  min_reference_links: 4
  check_link_reachability: true
  link_timeout_seconds: 8
  max_similarity_ratio: 0.72
  link_check_delay: 0.5

notifications:
  fail_on_error: false
  email:
    enabled: true
    port: 587
  telegram:
    enabled: false

# GitHub repo for one-click publish from email
github:
  owner: "prem-p-singh"
  repo: "prem-pratap-singh"
